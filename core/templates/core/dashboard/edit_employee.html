{% extends 'core/dashboard_base.html' %}
{% block dashboard_content %}
<div style="max-width: 800px; margin: 0 auto;" class="animate-fade">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <h2 style="font-size: 24px; font-weight: 700;">Edit Member Account</h2>
        <a href="{% url 'dashboard_employees' %}" class="btn btn-outline" style="display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2"/></svg>
            Back to List
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="card" style="margin-bottom: 24px;">
            <h3 style="font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 24px;">Identity Info</h3>
            
            <div style="background: var(--bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); display: flex; gap: 40px; margin-bottom: 24px;">
                <div>
                    <div style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Employee ID</div>
                    <div style="font-size: 14px; font-weight: 700;">#{{ employee.employee_id }}</div>
                </div>
                <div>
                    <div style="font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Username</div>
                    <div style="font-size: 14px; font-weight: 700;">{{ employee.user.username }}</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">First Name</label>
                    <input type="text" name="first_name" value="{{ employee.first_name }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Last Name</label>
                    <input type="text" name="last_name" value="{{ employee.last_name }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Email Address</label>
                    <input type="email" name="email" value="{{ employee.email }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Phone Number</label>
                    <input type="text" name="phone_number" value="{{ employee.phone_number }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <h3 style="font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 24px;">Financial & HR Info</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Designation</label>
                    <input type="text" name="designation" value="{{ employee.designation }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Joining Date</label>
                    <input type="date" name="joining_date" value="{{ employee.joining_date|date:'Y-m-d' }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Basic Monthly Salary ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="monthly_salary" value="{{ employee.monthly_salary|floatformat:2 }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">HRA ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="hra" value="{{ employee.hra|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Travel Allowance ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="travel_allowance" value="{{ employee.travel_allowance|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Special Allowance ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="special_allowance" value="{{ employee.special_allowance|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
            </div>

            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--danger);">PF Deduction ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="pf_deduction" value="{{ employee.pf_deduction|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--danger);">ESI Deduction ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="esi_deduction" value="{{ employee.esi_deduction|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--danger);">Professional Tax ({{ company.currency_symbol }})</label>
                    <input type="number" step="0.01" name="professional_tax" value="{{ employee.professional_tax|floatformat:2 }}" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
            </div>

            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Shift Start</label>
                    <input type="time" name="shift_start" value="{{ employee.shift_start|time:'H:i' }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Shift End</label>
                    <input type="time" name="shift_end" value="{{ employee.shift_end|time:'H:i' }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 32px;">
            <h3 style="font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px;">Access Credentials</h3>
            <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">New Password (Leave blank to keep current)</label>
            <input type="password" name="password" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; height: 54px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Save Member Changes
        </button>
    </form>
</div>
{% endblock %}
