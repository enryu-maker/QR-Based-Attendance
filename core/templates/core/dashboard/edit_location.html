{% extends 'core/dashboard_base.html' %}
{% block dashboard_content %}
<div style="max-width: 600px; margin: 0 auto;" class="animate-fade">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <h2 style="font-size: 24px; font-weight: 700;">Edit Office Site</h2>
        <a href="{% url 'dashboard_location' %}" class="btn btn-outline">Back to List</a>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="card" style="margin-bottom: 32px;">
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Office Name</label>
                <input type="text" name="name" value="{{ location.name }}" placeholder="Mumbai HQ" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Latitude</label>
                    <input type="number" step="any" name="latitude" value="{{ location.latitude }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Longitude</label>
                    <input type="number" step="any" name="longitude" value="{{ location.longitude }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
                </div>
            </div>
            
            <div style="margin-bottom: 8px;">
                <label style="display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px;">Allowed Radius (Meters)</label>
                <input type="number" name="max_distance_meters" value="{{ location.max_distance_meters }}" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none;">
            </div>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 32px;">Employees must be within this distance to punch in successfully.</p>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
