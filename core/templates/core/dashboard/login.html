<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AttendOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #2563EB;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--text-main);
            padding: 24px;
        }

        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .logo span { color: var(--primary); }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; font-weight: 500; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Target django form inputs specifically */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            background: #FAFBFE;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 12px;
        }
        .btn:hover { background: #1d4ed8; }

        .errorlist { 
            list-style: none; 
            color: #ef4444; 
            font-size: 13px; 
            margin-bottom: 20px; 
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fee2e2;
            font-weight: 600;
        }

        .footer-text {
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">AttendOS<span>.</span></div>
        <p class="subtitle">Management Console Login</p>

        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <ul class="errorlist">
                    <li>Invalid credentials. Access denied.</li>
                </ul>
            {% endif %}

            <div class="form-group">
                <label>System Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Secure Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn">Sign In to Dashboard</button>
        </form>
        
        <div class="footer-text">
            Protected by AttendOS Multi-Auth
        </div>
    </div>
</body>
</html>
