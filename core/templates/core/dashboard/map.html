{% extends 'core/dashboard_base.html' %}
{% block dashboard_content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    #map { height: calc(100vh - 220px); border-radius: 12px; border: 1px solid var(--border); z-index: 1; }
    .leaflet-popup-content-wrapper { border-radius: 8px; border: 1px solid var(--border); box-shadow: none; }
    .popup-user { font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
    .popup-time { font-size: 11px; color: var(--text-muted); }
    .badge-map { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge-valid { background: #DCFCE7; color: #166534; }
    .badge-invalid { background: #FEE2E2; color: #991B1B; }
</style>

<div class="card animate-fade" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
    <div style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="font-size: 16px; font-weight: 700;">Live Interaction Map</h2>
            <div style="font-size: 12px; color: var(--text-muted);">Visualizing last 100 punch events</div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 6px;">
                <div style="width: 10px; height: 10px; border-radius: 2px; background: #2563EB;"></div>
                <span style="font-size: 11px; font-weight: 600;">OFFICE</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px; margin-left: 12px;">
                <div style="width: 10px; height: 10px; border-radius: 2px; background: #EF4444;"></div>
                <span style="font-size: 11px; font-weight: 600;">LAST SCANS</span>
            </div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
        attribution: 'OSM'
    }).addTo(map);

    const bounds = [];
    
    // Office Marker (Simple circle)
    {% for office in offices %}
        L.circle([{{ office.latitude }}, {{ office.longitude }}], {
            radius: {{ office.max_distance_meters }},
            color: '#2563EB',
            fillColor: '#2563EB',
            fillOpacity: 0.1
        }).addTo(map);
        
        L.marker([{{ office.latitude }}, {{ office.longitude }}])
            .addTo(map)
            .bindPopup("<b>{{ office.name }}</b>");
        bounds.push([{{ office.latitude }}, {{ office.longitude }}]);
    {% endfor %}

    // Scan Markers
    {% for att in attendances %}
        {% if att.latitude and att.longitude %}
            L.circleMarker([{{ att.latitude }}, {{ att.longitude }}], {
                radius: 6,
                fillColor: "{% if att.status == 'Valid' %}#10B981{% else %}#EF4444{% endif %}",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map)
            .bindPopup(`
                <div class="popup-user">{{ att.employee.first_name }} {{ att.employee.last_name }}</div>
                <div class="popup-time">{{ att.timestamp|date:"M d, H:i" }}</div>
                <div class="badge-map {% if att.status == 'Valid' %}badge-valid{% else %}badge-invalid{% endif %}" style="margin-top: 6px; display: inline-block;">
                    {{ att.status }}
                </div>
            `);
            bounds.push([{{ att.latitude }}, {{ att.longitude }}]);
        {% endif %}
    {% endfor %}

    if (bounds.length > 0) map.fitBounds(bounds, {padding: [50, 50]});
</script>
{% endblock %}
