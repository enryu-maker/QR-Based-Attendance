{% extends 'core/dashboard_base.html' %}
{% block dashboard_content %}
<div class="split-layout">
    <div class="split-list" style="flex: 1; padding: 40px; max-width: 600px; min-height: 500px;">
        <div style="display: flex; gap: 10px; align-items:center; margin-bottom: 24px;">
            <a href="{% url 'dashboard_employees' %}" style="text-decoration:none; color:var(--text-muted); font-size:20px;">&larr;</a>
            <h2 style="font-size: 24px; color: var(--text-main); margin-bottom: 0px;">Add New Employee</h2>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 24px;">
                <label>Unique Employee ID</label>
                <input type="text" name="employee_id" placeholder="E.g., EMP002, NT-1045" required>
            </div>
            
            <div style="display: flex; gap: 20px; margin-bottom: 24px;">
                <div style="flex: 1;">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="John" required>
                </div>
                <div style="flex: 1;">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Doe" required>
                </div>
            </div>
            
            <div style="margin-bottom: 24px;">
                <label>Work Email Address</label>
                <input type="text" name="email" placeholder="john@attendflow.io" required>
            </div>
            
            <div style="margin-bottom: 24px;">
                <label>Phone Number (Optional)</label>
                <input type="text" name="phone_number" placeholder="Enter contact number">
            </div>
            
            <div style="margin-bottom: 30px;">
                <label>Monthly Salary Rate (₹)</label>
                <div style="font-size: 13px; color: var(--text-muted); margin-bottom:12px;">This is used by the billing and salary engine to calculate monthly payroll.</div>
                <input type="number" step="0.01" name="monthly_salary" value="30000.00" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">Register Employee</button>
        </form>
    </div>
</div>
{% endblock %}
