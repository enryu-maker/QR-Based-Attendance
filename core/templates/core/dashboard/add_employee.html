{% extends 'core/dashboard_base.html' %}
{% block dashboard_content %}
<div class="split-layout">
    <div class="split-list" style="flex: 1; padding: 40px; max-width: 800px; min-height: 500px;">
        <div style="display: flex; gap: 10px; align-items:center; margin-bottom: 32px;">
            <a href="{% url 'dashboard_employees' %}" style="text-decoration:none; color:var(--text-muted); font-size:20px; transition: 0.2s; padding: 8px; border-radius: 50%;">&larr;</a>
            <div>
                <h2 style="font-size: 24px; color: var(--text-main); margin-bottom: 4px;">Register Employee</h2>
                <p style="font-size: 13px; color: var(--text-muted); margin: 0;">Add a new member to your organization's attendance engine.</p>
            </div>
        </div>
        
        <form method="POST" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            {% csrf_token %}
            
            <div style="grid-column: span 2;">
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Unique Employee ID</label>
                <input type="text" name="employee_id" placeholder="E.g., EMP002, NT-1045" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">First Name</label>
                <input type="text" name="first_name" placeholder="John" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Last Name</label>
                <input type="text" name="last_name" placeholder="Doe" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Work Email</label>
                <input type="email" name="email" placeholder="john@company.com" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Phone Number</label>
                <input type="text" name="phone_number" placeholder="+91 98765 43210" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Designation / Role</label>
                <input type="text" name="designation" placeholder="E.g., Production Expert" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            <div>
                <label style="font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Monthly Salary Rate (₹)</label>
                <input type="number" step="0.01" name="monthly_salary" value="30000.00" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; background: var(--surface);">
            </div>
            
            <div style="grid-column: span 2; margin-top: 20px;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 700; box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);">Register Employee</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
