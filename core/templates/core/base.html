<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendFlow - Universal Smart Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E8E8E3;
            --surface-color: #0A0A0A;
            --primary-color: #2196F3;
            --primary-hover: #1976D2;
            --text-color: #0A0A0A;
            --surface-text: #FFFFFF;
            --text-muted: #737373;
            --success-color: #10b981;
            --error-color: #ef4444;
            --glass-border: rgba(33, 150, 243, 0.3);
            --accent-color: #1976D2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--surface-color);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: var(--surface-text);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        main {
            flex: 1;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: var(--surface-color);
            color: var(--surface-text);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: #FFFFFF;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
        }

        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--success-color);
            color: #34d399;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error-color);
            color: #f87171;
        }

        h1, h2, h3 {
            margin-bottom: 1rem;
            text-align: center;
        }

        p {
            color: var(--surface-text);
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="logo">AttendFlow<span style="color:var(--surface-text); -webkit-text-fill-color:var(--surface-text);">.</span></a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'admin_dashboard' %}">Dashboard</a>
            {% else %}
                <a href="{% url 'login' %}">Admin Login</a>
            {% endif %}
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
