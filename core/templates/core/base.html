<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendOS - Human Operations Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E8E8E3;
            --surface: #FFFFFF;
            --primary: #2196F3;
            --text-main: #0A0A0A;
            --text-muted: #525252;
            --border: rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        nav {
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            /* background: rgba(232, 232, 227, 0.8); */ /* Optional glass effect if needed */
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logo span { color: var(--primary); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .btn-nav {
            background: var(--text-main);
            color: white !important;
            padding: 10px 24px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        main {
            flex: 1;
            padding-top: 80px;
        }

        /* Standard Nerdos Button Style */
        .btn-capsule {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--text-main);
            color: #FFFFFF;
            padding: 16px 40px;
            border-radius: 100px;
            text-decoration: none !important;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-capsule:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            nav { padding: 20px 24px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="logo">ATTEND<span>OS</span></a>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="{% url 'login' %}">Admin Portal</a>
            <a href="{% url 'admin_dashboard' %}" class="btn-nav">Dashboard &rarr;</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        // Scroll reveal logic
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        window.addEventListener("load", reveal);
    </script>
</body>
</html>
