{% extends 'core/base.html' %}
{% block content %}
<div class="glass-panel" style="max-width: 600px; text-align: center;">
    <h2 style="font-size: 2.5rem; background: linear-gradient(to right, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Welcome to AttendFlow</h2>
    <p style="font-size: 1.1rem;">A next-generation geo-fenced QR attendance system.</p>
    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
        <a href="{% url 'dashboard_qr' %}" class="btn" style="width: auto;">Display Office QR</a>
        <a href="{% url 'mark_attendance' %}" class="btn" style="width: auto; background: transparent; border: 1px solid var(--primary-color); color: var(--surface-text);">Mark My Attendance</a>
    </div>
</div>
{% endblock %}
