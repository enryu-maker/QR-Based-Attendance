<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - {{ employee.first_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F7FE;
            --surface: #FFFFFF;
            --primary: #4318FF;
            --text-main: #2B3674;
            --text-muted: #A3AED0;
            --border: #E0E5F2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; }
        .card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .back-link { text-decoration: none; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: 24px; margin-bottom: 30px; }
        label { display: block; font-weight: 700; font-size: 13px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 24px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; background: var(--primary); color: white; font-size: 16px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'employee_portal' %}" class="back-link">&larr; Back to Dashboard</a>
        <div class="card">
            <h1>Account Settings</h1>
            <form method="POST">
                {% csrf_token %}
                
                <label>Profile Name</label>
                <input type="text" value="{{ employee.first_name }} {{ employee.last_name }}" disabled style="background: #f8f9fc; cursor: not-allowed;">

                <label>Email Address</label>
                <input type="email" value="{{ employee.email }}" disabled style="background: #f8f9fc; cursor: not-allowed;">

                <label>Phone Number</label>
                <input type="text" name="phone_number" value="{{ employee.phone_number }}" placeholder="Update phone number">

                <label>Change Password</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password">
                <p style="font-size: 11px; color: var(--text-muted); margin-top: -15px; margin-bottom: 25px;">Note: Changing password will log you out.</p>

                <button type="submit" class="btn">Update Profile</button>
            </form>
        </div>
    </div>
</body>
</html>
