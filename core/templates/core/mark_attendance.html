<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - AttendOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #2563EB;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .attendance-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .header-mini { margin-bottom: 32px; }
        .logo-mark { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .logo-mark span { color: var(--primary); }
        .company-name { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--primary); background: #fff; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: #F1F5F9;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #CBD5E1; }
        .dot.active { background: var(--primary); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: var(--text-main); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 600;
        }
        .alert-success { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
        .alert-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        footer { margin-top: 32px; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="attendance-card">
        <div class="header-mini">
            <div class="logo-mark">AttendOS<span>.</span></div>
            <div class="company-name">{{ company.name|default:"Authentication Portal" }}</div>
        </div>

        <h1>Mark Attendance</h1>
        <p>Geo-validated workforce entry/exit</p>

        {% if message %}
            <div class="alert alert-{{ message_type }}">{{ message }}</div>
        {% endif %}
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" id="attendance-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Employee Identifier</label>
                <input type="text" name="employee_id" id="employee_id" placeholder="Enter your ID..." required>
            </div>

            <input type="hidden" name="latitude" id="lat">
            <input type="hidden" name="longitude" id="lon">

            <div class="status-pill" id="status-container">
                <div class="dot active" id="spinner"></div>
                <span id="status-msg">Validating Location...</span>
            </div>

            <div id="btn-stack" style="display: none;">
                <button type="submit" name="punch_type" value="IN" class="btn btn-primary" id="btn-in">Confirm Punch IN</button>
                <button type="submit" name="punch_type" value="OUT" class="btn btn-dark" id="btn-out" style="display: none;">Confirm Punch OUT</button>
            </div>
        </form>
    </div>

    <footer>Security Powered by AttendOS</footer>

    <script>
        const latInput = document.getElementById("lat");
        const lonInput = document.getElementById("lon");
        const empInput = document.getElementById("employee_id");
        const btnIn = document.getElementById("btn-in");
        const btnOut = document.getElementById("btn-out");
        const btnStack = document.getElementById("btn-stack");
        const statusMsg = document.getElementById("status-msg");
        const dot = document.getElementById("spinner");

        function updatePunchStatus() {
            const id = empInput.value.trim();
            if(id.length < 2) return;
            fetch(`/check_punch_status/{{ company.slug }}/${id}/`)
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    if(data.next_punch === 'IN') {
                        btnIn.style.display = 'flex';
                        btnOut.style.display = 'none';
                    } else {
                        btnIn.style.display = 'none';
                        btnOut.style.display = 'flex';
                    }
                }
            });
        }

        let timeout;
        empInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updatePunchStatus, 500);
        });

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    latInput.value = pos.coords.latitude;
                    lonInput.value = pos.coords.longitude;
                    statusMsg.innerText = "Location Verified";
                    dot.style.background = "var(--success)";
                    dot.classList.remove('active');
                    btnStack.style.display = 'block';
                    if(empInput.value) updatePunchStatus();
                },
                (err) => {
                    statusMsg.innerText = "GPS Access Denied";
                    dot.style.background = "var(--danger)";
                    dot.classList.remove('active');
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusMsg.innerText = "Browser Incompatible";
        }
    </script>
</body>
</html>
